services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: smartscholar
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    image: ${DOCKER_REPOSITORY:-smart-scholar}/api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/smartscholar?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ALLOWED_ORIGINS: https://smartscholar.titacenter.com
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      - db
      - redis

  web:
    image: ${DOCKER_REPOSITORY:-smart-scholar}/web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: https://smartscholar.titacenter.com/api
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-supersecret}
      NEXTAUTH_URL: https://smartscholar.titacenter.com
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
