<VirtualHost *:80>
    ServerName smartscholar.titacenter.com

    ProxyPreserveHost On
    ProxyRequests Off

    # API Proxy
    ProxyPass /api http://localhost:4000/api
    ProxyPassReverse /api http://localhost:4000/api

    # Socket.IO Proxy
    ProxyPass /socket.io http://localhost:4000/socket.io
    ProxyPassReverse /socket.io http://localhost:4000/socket.io

    # Web App Proxy
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    ErrorLog ${APACHE_LOG_DIR}/smartscholar_error.log
    CustomLog ${APACHE_LOG_DIR}/smartscholar_access.log combined
</VirtualHost>
